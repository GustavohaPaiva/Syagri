name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:pages
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify build output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          test -f dist/.nojekyll
          test -d dist/assets
          if grep -q '/src/main.jsx' dist/index.html; then
            echo 'Build inválido: index.html ainda aponta para /src/main.jsx'
            exit 1
          fi
          if ! grep -q '/Syagri/assets/' dist/index.html; then
            echo 'Build inválido: assets não usam base /Syagri/'
            exit 1
          fi

      - name: Upload artifact (GitHub Actions Pages)
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true

  # Opcional: só funciona se Settings → Pages → Source = "GitHub Actions".
  # A branch gh-pages (passo peaceiris acima) já publica o site sozinha.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: https://gustavohapaiva.github.io/Syagri/
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
